name: Build ImmortalWrt RAX3000M

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev file wget libelf-dev ecj fastjar java-propose-classpath

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b openwrt-21.02 https://github.com/hanwckf/immortalwrt-mt798x.git source

      - name: Show source info
        run: |
          cd source
          git branch --show-current
          ls defconfig
          test -f defconfig/mt7981-ax3000.config
          test -d target/linux/generic/hack-5.4

      - name: Update and install feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy kernel patch into hack-5.4
        run: |
          cd source
          cp ../patches/999-rndis-host-rx-fixup-workaround.patch target/linux/generic/hack-5.4/
          echo "Patch copied:"
          ls -l target/linux/generic/hack-5.4/999-rndis-host-rx-fixup-workaround.patch

      - name: Prepare config for RAX3000M
        run: |
          cd source
          cp -f defconfig/mt7981-ax3000.config .config
          echo 'CONFIG_TARGET_mediatek=y' >> .config
          echo 'CONFIG_TARGET_mediatek_mt7981=y' >> .config
          echo 'CONFIG_TARGET_mediatek_mt7981_DEVICE_cmcc_rax3000m=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-usb-net-rndis=y' >> .config
          make defconfig

      - name: Download sources
        run: |
          cd source
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Collect firmware files
        run: |
          mkdir -p upload
          cp -r source/bin/targets/*/* upload/ || true
          find upload -type f | sort

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: rax3000m-firmware
          path: upload/
